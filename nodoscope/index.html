<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NODOSCOPE v2</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#020408;--p:#00ffe0;--s:#ff3cac;--a:#ffe600;--panel:rgba(0,8,18,0.92)}
body{background:var(--bg);color:var(--p);font-family:'Share Tech Mono',monospace;overflow:hidden;width:100vw;height:100vh;user-select:none}
canvas{position:fixed;inset:0;width:100%;height:100%}

/* PANEL */
#panel{position:fixed;left:0;top:0;bottom:0;width:280px;background:var(--panel);border-right:1px solid rgba(0,255,224,0.15);backdrop-filter:blur(16px);display:flex;flex-direction:column;z-index:20}
#panel-l{position:fixed;right:0;top:0;bottom:0;width:280px;background:var(--panel);border-left:1px solid rgba(0,255,224,0.15);backdrop-filter:blur(16px);display:flex;flex-direction:column;z-index:20}#ph{padding:16px 16px 10px;border-bottom:1px solid rgba(0,255,224,0.1)}
#ph h1{font-family:'Orbitron',sans-serif;font-size:15px;font-weight:900;letter-spacing:4px;color:var(--p);text-shadow:0 0 20px var(--p)}
#ph p{font-size:8px;letter-spacing:2px;color:rgba(0,255,224,0.3);margin-top:3px}
#scroll{flex:1;overflow-y:auto;padding:8px 0;display:flex;flex-direction:column;gap:3px}
#scroll::-webkit-scrollbar{width:2px}
#scroll::-webkit-scrollbar-thumb{background:var(--p)}
.panel-scroll{flex:1;overflow-y:auto;padding:8px 0;display:flex;flex-direction:column;gap:3px}
.panel-scroll::-webkit-scrollbar{width:2px}
.lcard-extra-top{margin-top:8px}
.lcard{border:1px solid rgba(0,255,224,0.08);transition:border-color .2s}
.lcard.on{border-color:rgba(0,255,224,0.25)}
.lcard .lhdr{opacity:0.35;transition:opacity .2s}
.lcard.on .lhdr{opacity:1}

/* CONTROLES */
.slbl{font-size:9px;letter-spacing:3px;color:rgba(0,255,224,0.3);padding:8px 0 4px;border-bottom:1px solid rgba(0,255,224,0.07);margin-bottom:3px;margin-top:3px}
.ctrl{display:flex;flex-direction:column;gap:9px;padding:4px 12px}.crow{display:flex;justify-content:space-between;align-items:center}
.ctrl label{font-size:11px;letter-spacing:1px;color:rgba(0,255,224,0.6)}
.val{font-size:11px;color:var(--a);min-width:36px;text-align:right}
input[type=range]{-webkit-appearance:none;width:100%;height:3px;background:rgba(0,255,224,0.12);border-radius:1px;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--p);box-shadow:0 0 6px var(--p);cursor:pointer}

/* CAPAS */
.lcard{border:1px solid rgba(255,255,255,0.07);border-radius:2px;margin-bottom:5px;margin-left:12px;margin-right:12px}
.lcard.on{border-color:rgba(0,255,224,0.2)}
.lhdr{display:flex;align-items:center;gap:5px;padding:7px 8px;cursor:pointer}
.lbody{padding:0 0 8px}
.slbl{font-size:9px;letter-spacing:3px;color:rgba(0,255,224,0.3);padding:8px 12px 4px;border-bottom:1px solid rgba(0,255,224,0.07);margin-bottom:3px;margin-top:3px}
.ldot{width:9px;height:9px;border-radius:50%;flex-shrink:0;cursor:pointer;border:1px solid transparent}
.lname{font-size:10px;letter-spacing:2px;flex:1}
.ltog{background:transparent;border:1px solid currentColor;font-family:'Share Tech Mono',monospace;font-size:9px;padding:3px 7px;cursor:pointer}
.ltog.off{opacity:0.35}
.lrst{background:transparent;border:1px solid rgba(0,255,224,0.3);color:rgba(0,255,224,0.5);font-family:'Share Tech Mono',monospace;font-size:9px;padding:3px 6px;cursor:pointer;margin-left:2px}
.lrst:hover{border-color:var(--p);color:var(--p)}
.lrm{background:transparent;border:1px solid rgba(255,60,60,0.4);color:rgba(255,60,60,0.5);font-family:'Share Tech Mono',monospace;font-size:9px;padding:3px 6px;cursor:pointer;margin-left:2px}
.larr{font-size:9px;margin:0 2px;opacity:0.5}

/* PALETA DE COLORES */
.col-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;margin-bottom:4px;box-sizing:border-box;padding:2px 4px 2px 12px}
.col-swatch{height:24px;border-radius:2px;cursor:pointer;transition:all .15s;opacity:0.7}
.col-swatch:hover{opacity:1;transform:scaleY(1.1)}
.col-swatch.active{opacity:1;outline:2px solid rgba(255,255,255,0.8);outline-offset:1px}
.ltabs{display:flex;gap:2px;padding:0 12px 6px;border-bottom:1px solid rgba(255,255,255,0.06);margin-bottom:6px}
.ltab{flex:1;background:transparent;border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.3);font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:1px;padding:5px 2px;cursor:pointer;text-align:center;transition:all .15s}
.ltab.active{background:rgba(255,255,255,0.07);color:#fff;border-color:rgba(255,255,255,0.35)}
.ltab-content{display:none;flex-direction:column;gap:3px}
.ltab-content.active{display:flex}
.lsec{font-size:9px;letter-spacing:2px;color:rgba(255,255,255,0.2);padding:7px 12px 4px;border-bottom:1px solid rgba(255,255,255,0.05);margin-bottom:4px;margin-top:5px}

/* BOTONES GEOMETRIA */
.geo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;margin-bottom:4px;padding:0 12px}
.gb{background:transparent;border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.3);font-family:'Share Tech Mono',monospace;font-size:9px;padding:6px 2px;cursor:pointer;text-align:center;transition:all .15s}
.gb.active,.gb:hover{background:rgba(255,255,255,0.08);color:#fff;border-color:rgba(255,255,255,0.35)}

/* BOTONES BANDA */
.band-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;margin-bottom:4px;padding:0 12px}
.bb{background:transparent;border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.3);font-family:'Share Tech Mono',monospace;font-size:9px;padding:5px 2px;cursor:pointer;text-align:center}
.bb.active{background:rgba(255,255,255,0.1);color:#fff;border-color:rgba(255,255,255,0.4)}

/* TOGGLE EFECTO */
.efx-toggle{width:100%;background:transparent;font-family:'Share Tech Mono',monospace;font-size:10px;padding:6px 12px;cursor:pointer;margin-bottom:4px;letter-spacing:1px;border-radius:1px;text-align:left;box-sizing:border-box}
.efx-toggle.off{opacity:0.4}

/* BOTONES GENERALES */
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.btn{background:transparent;border:1px solid var(--p);color:var(--p);font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:1px;padding:9px;cursor:pointer;width:100%;transition:all .15s}
.btn:hover{background:rgba(0,255,224,0.07)}
.btn.full{grid-column:1/-1}
.btn.danger{border-color:var(--s);color:var(--s)}
.btn.warn{border-color:var(--a);color:var(--a)}
#bottom{padding:10px 12px;border-top:1px solid rgba(0,255,224,0.1);display:flex;flex-direction:column;gap:5px}

/* MODO BPM */
.bmode-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;margin-bottom:5px}
.bmode{background:transparent;border:1px solid rgba(0,255,224,0.15);color:rgba(0,255,224,0.35);font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:1px;padding:6px 2px;cursor:pointer;text-align:center}
.bmode.active{background:rgba(0,255,224,0.08);border-color:var(--p);color:var(--p)}
.bmode.off-btn{border-color:rgba(255,60,172,0.2);color:rgba(255,60,172,0.35)}
.bmode.off-btn.active{background:rgba(255,60,172,0.08);border-color:var(--s);color:var(--s)}

/* MIDI MAP mode */
body.midi-mapping .midi-wrap{position:relative;cursor:crosshair}
body.midi-mapping .midi-wrap::after{content:'';position:absolute;inset:0;background:rgba(255,200,0,0.08);border:1px solid rgba(255,200,0,0.4);border-radius:2px;pointer-events:none;z-index:100}
body.midi-mapping .midi-wrap.waiting::after{background:rgba(255,200,0,0.25);border-color:#ffc800;box-shadow:0 0 8px #ffc800}
body.midi-mapping .midi-wrap.mapped::after{background:rgba(0,255,100,0.1);border-color:rgba(0,255,100,0.4)}

/* BARRA INFERIOR — 3 columnas iguales solo en el centro */
#bottombar{position:fixed;bottom:0;left:280px;right:280px;height:220px;background:rgba(2,4,8,0.98);border-top:1px solid rgba(0,255,224,0.15);backdrop-filter:blur(16px);z-index:10;display:flex;box-sizing:border-box}
.bb-col{flex:1;display:flex;flex-direction:column;justify-content:center;gap:7px;padding:10px 16px 48px}
.bb-col+.bb-col{border-left:1px solid rgba(0,255,224,0.08)}
.bb-col-title{font-size:7px;letter-spacing:3px;color:rgba(0,255,224,0.22);margin-bottom:1px}
.bb-row{display:flex;align-items:center;gap:8px}
.bb-lbl{font-size:9px;letter-spacing:2px;color:rgba(0,255,224,0.4);white-space:nowrap;flex-shrink:0}
.bb-ctx{display:flex;align-items:center;gap:6px;flex:1}
.bb-range{-webkit-appearance:none;flex:1;height:2px;background:rgba(0,255,224,0.15);border-radius:1px;outline:none;cursor:pointer}
.bb-range::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--p);box-shadow:0 0 5px var(--p);cursor:pointer}
#bpm-val-b{font-size:26px;font-family:'Orbitron',sans-serif;font-weight:700;color:var(--a);letter-spacing:2px;min-width:52px;flex-shrink:0;line-height:1}
#beat-dot-b{width:9px;height:9px;border-radius:50%;background:rgba(0,255,224,0.15);flex-shrink:0;transition:all 0.05s}
#vu-bar{display:flex;gap:2px;align-items:flex-end;height:24px;flex:1}
#vu-bar .vb{flex:1;background:var(--p);border-radius:1px 1px 0 0;min-height:2px}
#bb-tap-btn{background:transparent;border:2px solid var(--p);color:var(--p);font-family:'Share Tech Mono',monospace;font-size:12px;letter-spacing:3px;padding:7px;cursor:pointer;width:100%;transition:all .1s}
#bb-tap-btn:active{background:rgba(0,255,224,0.12);transform:scale(0.97)}
.bb-btn-audio{background:transparent;border:1px solid var(--p);color:var(--p);font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;padding:6px;cursor:pointer;width:100%;transition:all .15s}
.bb-btn-audio:hover,.bb-btn-audio.live{background:rgba(0,255,224,0.1)}
.bb-gsep{width:100%;height:1px;background:rgba(0,255,224,0.06);margin:2px 0}
.bb-gctrl{display:flex;align-items:center;gap:7px}
.bb-glbl{font-size:8px;letter-spacing:1px;color:rgba(0,255,224,0.4);min-width:68px;flex-shrink:0}
.bb-grange{-webkit-appearance:none;flex:1;height:2px;background:rgba(0,255,224,0.15);border-radius:1px;outline:none;cursor:pointer}
.bb-grange::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--p);box-shadow:0 0 5px var(--p);cursor:pointer}
.bb-tog{background:transparent;border:1px solid rgba(0,255,224,0.2);color:rgba(0,255,224,0.35);font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;padding:4px 8px;cursor:pointer;flex-shrink:0;transition:all .15s}
.bb-tog.on{border-color:var(--p);color:var(--p);background:rgba(0,255,224,0.07)}
.bb-act{background:transparent;font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;padding:6px;cursor:pointer;width:100%;transition:all .15s;text-align:center}
.bb-act.reset{border:1px solid var(--s);color:var(--s)}
.bb-act.freeze{border:1px solid rgba(167,139,250,0.5);color:rgba(167,139,250,0.7)}
.bb-act.freeze.on{background:rgba(167,139,250,0.1)}
.bb-act.fs{border:1px solid rgba(0,255,224,0.2);color:rgba(0,255,224,0.3)}
/* FADERS */
.bb-faders{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6px 0 48px;border-left:1px solid rgba(0,255,224,0.08);border-right:1px solid rgba(0,255,224,0.08)}
.bb-faders-row{display:flex;align-items:flex-end;justify-content:center;gap:28px}
.bb-fw{display:flex;flex-direction:column;align-items:center;gap:10px}
.bb-fn{font-size:9px;letter-spacing:2px}
.bb-fon{width:42px;height:18px;border:1px solid currentColor;background:transparent;font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.bb-ft{width:8px;height:90px;background:rgba(0,255,224,0.07);border-radius:4px;position:relative;cursor:pointer;user-select:none}
.bb-ff{position:absolute;bottom:0;left:0;right:0;border-radius:4px;opacity:0.35}
.bb-fth{position:absolute;width:26px;height:6px;border-radius:3px;left:50%;transform:translateX(-50%);cursor:grab}
.bb-fpct{font-size:8px;color:var(--a)}
/* ocultar HUD viejo */
#vu{display:none}#bpm-hud{display:none}#fps{display:none}#status{display:none}
/* canvas: solo respeta barra inferior, los paneles van encima */
canvas{position:fixed;left:280px;right:280px;top:0;bottom:220px;width:calc(100% - 560px);height:calc(100% - 220px)}
/* HUD de estado — esquina superior izquierda del área central */
#hud-status{position:fixed;left:292px;top:10px;z-index:15;display:flex;align-items:center;gap:8px;font-size:9px;letter-spacing:2px;color:rgba(0,255,224,0.3)}
#hud-dot{width:6px;height:6px;border-radius:50%;background:rgba(0,255,224,0.15);transition:all .3s;flex-shrink:0}
#hud-dot.live{background:var(--p);box-shadow:0 0 8px var(--p)}
#hud-dot.warn{background:var(--a)}
#hud-fps{position:fixed;right:292px;top:10px;z-index:15;font-size:9px;letter-spacing:2px;color:rgba(0,255,224,0.18)}
.srow{display:flex;align-items:center;gap:6px;font-size:10px;letter-spacing:1px;color:rgba(0,255,224,0.3)}
.dot{width:5px;height:5px;border-radius:50%;background:rgba(0,255,224,0.15);transition:all .3s;flex-shrink:0}
.dot.live{background:var(--p);box-shadow:0 0 6px var(--p);animation:pulse 1s infinite}
.dot.warn{background:var(--a)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* VU + BPM */
#vu{position:fixed;left:14px;bottom:14px;z-index:10;display:flex;gap:2px;align-items:flex-end;height:45px}
.vb{width:3px;background:var(--p);border-radius:1px 1px 0 0;min-height:2px}
#bpm-hud{position:fixed;left:14px;bottom:68px;z-index:10;display:flex;align-items:center;gap:7px}
#beat-dot{width:7px;height:7px;border-radius:50%;background:rgba(0,255,224,0.15);transition:all 0.05s;flex-shrink:0}
#bpm-lbl{font-size:11px;letter-spacing:2px;color:rgba(0,255,224,0.35)}
#fps{position:fixed;left:14px;bottom:88px;font-size:9px;letter-spacing:2px;color:rgba(0,255,224,0.18);z-index:10}

/* ══════════════════════════════════════
   MOBILE  ≤ 860px
   Panel fijo de 280px en la parte inferior.
   Pestañas FORMA · MOV · FX internas.
   Solo muestra la capa activa (selector).
   Canvas ocupa el resto arriba.
══════════════════════════════════════ */
#mob { display:none }

@media (max-width:860px) {

  /* Ocultar todo lo de escritorio */
  #panel, #panel-l, #bottombar,
  #hud-status, #hud-fps { display:none !important }

  /* Canvas: ocupa todo menos el panel fijo */
  canvas {
    position:fixed !important;
    left:0 !important; right:0 !important;
    top:0 !important; bottom:280px !important;
    width:100% !important;
    height:calc(100% - 280px) !important;
  }

  /* Panel móvil fijo */
  #mob {
    display:flex;
    flex-direction:column;
    position:fixed;
    bottom:0; left:0; right:0;
    height:280px;
    background:rgba(2,4,10,0.97);
    border-top:1px solid rgba(0,255,224,0.15);
    backdrop-filter:blur(16px);
    z-index:30;
    overflow:hidden;
  }

  /* ── Fila superior: selector capa + tabs ── */
  #mob-top {
    display:flex;
    align-items:center;
    height:38px;
    flex-shrink:0;
    border-bottom:1px solid rgba(0,255,224,0.1);
    padding:0 10px;
    gap:8px;
  }

  /* Selector de capa activa */
  #mob-layer-sel {
    display:flex;
    gap:4px;
    flex-shrink:0;
  }
  .mob-lbtn {
    background:transparent;
    border:1px solid rgba(0,255,224,0.15);
    color:rgba(0,255,224,0.3);
    font-family:'Share Tech Mono',monospace;
    font-size:9px; letter-spacing:1px;
    padding:3px 8px; cursor:pointer;
    transition:all .15s;
  }
  .mob-lbtn.active {
    border-color:var(--p);
    color:var(--p);
    background:rgba(0,255,224,0.07);
  }

  /* Dot de color de la capa */
  #mob-layer-dot {
    width:8px; height:8px; border-radius:50%;
    flex-shrink:0;
    transition:background .2s, box-shadow .2s;
  }

  /* ON/OFF toggle de la capa */
  #mob-layer-tog {
    background:transparent;
    border:1px solid rgba(0,255,224,0.2);
    color:rgba(0,255,224,0.35);
    font-family:'Share Tech Mono',monospace;
    font-size:8px; letter-spacing:1px;
    padding:3px 7px; cursor:pointer;
    flex-shrink:0; transition:all .15s;
    margin-left:auto;
  }
  #mob-layer-tog.on { border-color:var(--p); color:var(--p) }

  /* ── Pestañas ── */
  #mob-tabs {
    display:flex;
    height:32px;
    flex-shrink:0;
    border-bottom:1px solid rgba(0,255,224,0.08);
  }
  .mtab {
    flex:1; background:transparent; border:none;
    border-right:1px solid rgba(0,255,224,0.06);
    color:rgba(0,255,224,0.28);
    font-family:'Share Tech Mono',monospace;
    font-size:9px; letter-spacing:2px;
    cursor:pointer; transition:all .15s;
  }
  .mtab:last-child { border-right:none }
  .mtab.active {
    color:var(--p);
    background:rgba(0,255,224,0.04);
    border-bottom:2px solid var(--p);
  }

  /* ── Área de contenido scrollable ── */
  #mob-content {
    flex:1;
    overflow-y:auto;
    padding:8px 12px 32px;
    scrollbar-width:thin;
    scrollbar-color:var(--p) transparent;
  }
  #mob-content::-webkit-scrollbar { width:2px }
  #mob-content::-webkit-scrollbar-thumb { background:var(--p) }

  /* Paneles internos */
  .mpanel { display:none; flex-direction:column; gap:6px }
  .mpanel.active { display:flex }

  /* Reusar estilos del desktop dentro del móvil */
  #mob-content .ctrl { padding:0 }
  #mob-content .lsec {
    font-size:8px; letter-spacing:2px;
    color:rgba(0,255,224,0.22);
    padding:4px 0 3px;
    border-bottom:1px solid rgba(0,255,224,0.06);
    margin-bottom:2px; margin-top:4px;
  }
  #mob-content .geo-grid { padding:0; margin-bottom:2px }
  #mob-content .band-grid { padding:0; margin-bottom:2px }
  #mob-content .col-grid  { padding:0 }
  #mob-content input[type=range] { height:3px }
  #mob-content input[type=range]::-webkit-slider-thumb {
    width:20px; height:20px; /* más grande para touch */
  }
  #mob-content .crow label { font-size:10px }
  #mob-content .val { font-size:11px }

  /* Panel FX — layout especial */
  #mob-fx-inner {
    display:flex; flex-direction:column; gap:7px;
  }
  #mob-fx-inner .bb-gctrl { gap:8px }
  #mob-fx-inner .bb-glbl { min-width:68px; font-size:8px }
  #mob-fx-inner .bb-grange::-webkit-slider-thumb {
    width:20px; height:20px;
  }
  #mob-fx-top {
    display:flex; gap:6px; align-items:center;
  }
  #mob-beat-dot {
    width:9px; height:9px; border-radius:50%;
    background:rgba(0,255,224,0.15);
    transition:all .05s; flex-shrink:0;
  }
  #mob-bpm-val {
    font-family:'Orbitron',sans-serif;
    font-size:20px; font-weight:700;
    color:var(--a); letter-spacing:2px; min-width:44px;
  }
  #mob-tap-btn {
    flex:1; background:transparent;
    border:2px solid var(--p); color:var(--p);
    font-family:'Share Tech Mono',monospace;
    font-size:12px; letter-spacing:3px;
    padding:7px; cursor:pointer; transition:all .1s;
  }
  #mob-tap-btn:active { background:rgba(0,255,224,0.12); transform:scale(.97) }
  #mob-audio-btn {
    background:transparent; border:1px solid var(--p); color:var(--p);
    font-family:'Share Tech Mono',monospace; font-size:10px;
    letter-spacing:2px; padding:7px; cursor:pointer; width:100%;
    transition:all .15s;
  }

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const MOB_BP = 860;
function isMob(){ return window.innerWidth <= MOB_BP; }
function resize(){
  if(isMob()){
    canvas.width  = innerWidth;
    canvas.height = innerHeight - 280;
  } else {
    canvas.width  = innerWidth  - 560;
    canvas.height = innerHeight - 220;
  }
}
resize(); window.addEventListener('resize', resize);

// GLOBAL
const G={rad:25,trail:0,rotX:0,rotY:0,rotZ:0,smooth:0.8,speed:1,
  strobe:0,strobeInt:0.4,zoomDecay:0.78,beatPulse:0,beatInt:0.25};
let aX=0,aY=0,aZ=0,time=0;

// AUDIO
let analyser=null,dataArray=null,audioCtx=null;
let sBands={sub:0,bass:0,mid:0,hi:0};

async function startAudio(){
  try{
    audioCtx=new AudioContext();
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    const src=audioCtx.createMediaStreamSource(stream);
    analyser=audioCtx.createAnalyser();
    analyser.fftSize=2048;
    src.connect(analyser);
    dataArray=new Uint8Array(analyser.frequencyBinCount);
    const btn=document.getElementById('bb-audio-btn');
    if(btn){btn.textContent='● AUDIO';btn.classList.add('live');}
    document.getElementById('hud-dot').className='live';
    document.getElementById('hud-lbl').textContent='AUDIO ACTIVO';
    buildVU();
  }catch(e){
    const btn=document.getElementById('bb-audio-btn');
    if(btn){btn.textContent='✕ ERROR';btn.style.borderColor='var(--s)';btn.style.color='var(--s)';}
    document.getElementById('hud-dot').className='warn';
    document.getElementById('hud-lbl').textContent='ERROR MICRÓFONO';
  }
}

function readAudio(){
  if(!analyser)return;
  analyser.getByteFrequencyData(dataArray);
  const bin=audioCtx.sampleRate/analyser.fftSize;
  let ss=0,sn=0,bs=0,bn=0,ms=0,mn=0,hs=0,hn=0;
  for(let i=0;i<dataArray.length;i++){
    const f=i*bin,v=dataArray[i]/255;
    if(f<80){ss+=v;sn++;}
    else if(f<250){bs+=v;bn++;}
    else if(f<4000){ms+=v;mn++;}
    else{hs+=v;hn++;}
  }
  const sm=G.smooth;
  // Sub y bass — suavizado normal
  sBands.sub=sBands.sub*sm+(sn?ss/sn:0)*(1-sm);
  sBands.bass=sBands.bass*sm+(bn?bs/bn:0)*(1-sm);
  // Mid — suavizado igual
  sBands.mid=sBands.mid*sm+(mn?ms/mn:0)*(1-sm);
  // Hi — suavizado más rápido para que los hats sean nítidos
  const hiSm=Math.min(sm,0.3);
  sBands.hi=sBands.hi*hiSm+(hn?hs/hn:0)*(1-hiSm);
  const now=performance.now();
  // Detectar beat — usa sub+bass+algo de mid para funcionar con micrófonos de webcam
  const beatSignal=sBands.sub*0.3+sBands.bass*0.5+sBands.mid*0.2;
  detectBeat(beatSignal);
  detectBands(now);
  updateVU();
}

let vuBars=[];
function buildVU(){
  const el=document.getElementById('vu-bar');if(!el)return;el.innerHTML='';vuBars=[];
  for(let i=0;i<24;i++){const b=document.createElement('div');b.className='vb';el.appendChild(b);vuBars.push(b);}
}
buildVU();
function updateVU(){
  if(!analyser)return;
  const step=Math.floor(dataArray.length/24);
  vuBars.forEach((b,i)=>{const v=dataArray[i*step]/255;b.style.height=(v*26+2)+'px';b.style.background=`hsl(${170+i*4},100%,55%)`;});
}

// DETECCIÓN POR BANDA — 4 detectores independientes
const BAND_DETECT={
  sub:  {flash:0,prev:0,thr:0.08,lastHit:0,decay:0.85},
  bass: {flash:0,prev:0,thr:0.12,lastHit:0,decay:0.82},
  mid:  {flash:0,prev:0,thr:0.02,lastHit:0,decay:0.88},
  hi:   {flash:0,prev:0,thr:0.003,lastHit:0,decay:0.65},
};

function detectBands(now){
  const bands={sub:sBands.sub,bass:sBands.bass,mid:sBands.mid,hi:sBands.hi};
  for(const [name,bd] of Object.entries(BAND_DETECT)){
    const val=bands[name];
    bd.flash*=bd.decay;
    // Detectar ataque — subida brusca sobre umbral
    if(val>bd.thr&&bd.prev<bd.thr*0.7){
      const gap=now-bd.lastHit;
    const minGap=name==='hi'?40:name==='mid'?60:80;
      if(gap>minGap){
        bd.flash=1;
        bd.lastHit=now;
      }
    }
    bd.prev=val;
  }
}

const BPM={mode:'auto',thr:0.15,lastKick:0,intervals:[],bpm:0,
  flash:0,onBeat:false,_prev:0,lastStrobeTime:0,tapTimes:[],manualBPM:120};

function tickStrobe(now){
  if(BPM.mode==='off'||BPM.bpm<=0)return;
  const period=60000/BPM.bpm;
  if(now-BPM.lastStrobeTime>=period){
    BPM.lastStrobeTime=now;
    BPM.flash=1;
    BPM.onBeat=true;
  } else { BPM.onBeat=false; }
  BPM.flash*=(G.zoomDecay||0.78);
  updateBPMDisplay();
}

function detectBeat(val){
  if(BPM.mode!=='auto')return;
  const now=performance.now();
  if(val>BPM.thr&&BPM._prev<BPM.thr*0.7){
    const iv=now-BPM.lastKick;
    if(iv>200&&iv<2000){
      BPM.intervals.push(iv);
      if(BPM.intervals.length>8)BPM.intervals.shift();
      const avg=BPM.intervals.reduce((a,b)=>a+b,0)/BPM.intervals.length;
      BPM.bpm=Math.round(60000/avg);
      BPM.lastStrobeTime=now;
      BPM.flash=1;BPM.onBeat=true;
    }
    BPM.lastKick=now;
  } else { BPM.onBeat=false; }
  BPM._prev=val;
  updateBPMDisplay();
}

function updateBPMDisplay(){
  const bd=document.getElementById('beat-dot-b');
  const bv=document.getElementById('bpm-val-b');
  if(bd){bd.style.background=`rgba(0,255,224,${BPM.flash})`;bd.style.boxShadow=`0 0 ${BPM.flash*14}px rgba(0,255,224,${BPM.flash})`;}
  if(bv)bv.textContent=BPM.bpm>0?BPM.bpm:'--';
}

function setBPMMode(mode){
  BPM.mode=mode;
  document.getElementById('bpm-auto-ui').style.display=mode==='auto'?'flex':'none';
  document.getElementById('bpm-tap-ui').style.display=mode==='tap'?'flex':'none';
  document.getElementById('bpm-man-ui').style.display=mode==='manual'?'flex':'none';
  document.querySelectorAll('.bmode').forEach(b=>b.classList.remove('active'));
  document.getElementById('bm-'+mode).classList.add('active');
  if(mode==='manual')setManualBPM(BPM.manualBPM);
  if(mode==='off'){BPM.bpm=0;BPM.flash=0;BPM.onBeat=false;updateBPMDisplay();}
}

function tapBPM(){
  const now=performance.now();
  BPM.tapTimes.push(now);
  if(BPM.tapTimes.length>8)BPM.tapTimes.shift();
  if(BPM.tapTimes.length>=2){
    const ivs=[];
    for(let i=1;i<BPM.tapTimes.length;i++)ivs.push(BPM.tapTimes[i]-BPM.tapTimes[i-1]);
    const avg=ivs.reduce((a,b)=>a+b,0)/ivs.length;
    BPM.bpm=Math.round(60000/avg);
    BPM.lastStrobeTime=now;
    document.getElementById('tap-hint').textContent=BPM.bpm+' BPM';
  }
  BPM.flash=1;updateBPMDisplay();
}

function setManualBPM(val){
  BPM.manualBPM=val;BPM.bpm=val;
  document.getElementById('v-manbpm').textContent=val;
  updateBPMDisplay();
}

// CAPAS
const COLS=[
  {h:'#00ffe0',r:0,  g:255,b:224},
  {h:'#ff3cac',r:255,g:60, b:172},
  {h:'#ffe600',r:255,g:230,b:0  },
  {h:'#39ff14',r:57, g:255,b:20 },
  {h:'#a78bfa',r:167,g:139,b:250},
  {h:'#ff6b35',r:255,g:107,b:53 },
  {h:'#ffffff',r:255,g:255,b:255},
];
const GEOS=['sphere','cube','torus','wave','dna','diamond'];
const GEO_LABELS=['ESFERA','CUBO','TORO','GRID','HELIX','ROMBO'];
const BANDS=['sub','bass','mid','hi'];
const BNAMES=['SUB','BAJO','MED','AGU'];

let layers=[],lid=0;

function defaultLayer(layerId,band,geo){
  const id=layerId;
  return {
    id: (id!==undefined?id:lid++), on:true, collapsed:false,
    geoStates: Object.fromEntries(GEOS.map(g=>{
      const def=Object.assign({},GEO_DEFAULTS[g]||GEO_DEFAULTS.sphere,{ci:0,band:null,bandStates:{},ox:0,oy:0,opacity:1,glow:0,lineOpacity:1,nodeOpacity:1,trail:0,amp:1,tent:0,tentN:6,tentLen:1,zoom:0,zoomInt:0.5,zoomDecay:0.78,zoomFlash:0});
      def.angleX=(g==='wave'||g==='torus')?Math.PI/2:0;
      def.angleY=0;
      def.driftX=0; def.driftY=0; def.driftOx=0; def.driftOy=0; def.driftBounce=false; def.driftLimit=0.8;
      def.orbitR=0; def.orbitSpd=0; def.orbitAngle=0; def.shakeInt=0; def.shakeVal=0; def.shakeDecay=0.4; def.shakeOn=false; def.shakeSource='audio'; def.noiseInt=0; def.noiseSpd=1; def.scatterInt=0; def.scatterVal=0; def.scatterDecay=0.3; def.scatterOn=false; def.scatterSource='audio'; def.mirrorH=false; def.mirrorV=false; def.mirrorX=0; def.mirrorY=0; def.cloneN=0; def.cloneR=0.3;
      return[g,def];
    })),
    geo: geo||'sphere', ci: 0, band: null,
    // FORMA
    density:43, links:5, nodeSize:10,
    // MOVIMIENTO
    amp:1, ox:0, oy:0,
    rad:25, rotX:0.5, rotY:0,
    drift:false, driftX:0, driftY:0, driftOx:0, driftOy:0, driftBounce:false, driftLimit:0.8,
    orbitR:0, orbitSpd:0, orbitAngle:0,
    shakeInt:0, shakeVal:0, shakeDecay:0.2, shakeOn:false, shakeSource:'audio',
    noiseInt:0, noiseSpd:1,
    scatterInt:0, scatterVal:0, scatterDecay:0.3, scatterOn:false, scatterSource:'audio',
    mirrorH:false, mirrorV:false,
    cloneN:0, cloneR:0.3,
    opacity:1, glow:0, lineOpacity:1, nodeOpacity:1,
    // AUDIO REACCION
    // EFECTOS
    trail:0,
    tent:0, tentN:6, tentLen:1,
    zoom:0, zoomInt:0.5, zoomDecay:0.78, zoomFlash:0,
    // internos
    nodes:[], edges:[], particles:[], maxPart:300,
  };
}

function buildNodes(L){
  L.nodes=[];L.edges=[];L.particles=[];
  if(L.geo==='part')return;
  const n=L.density, geo=L.geo;
  if(geo==='sphere'){
    const phi=Math.PI*(3-Math.sqrt(5));
    for(let i=0;i<n;i++){
      const y=1-(i/Math.max(n-1,1))*2;
      const r=Math.sqrt(Math.max(0,1-y*y));
      const t=phi*i;
      L.nodes.push({x:Math.cos(t)*r,y,z:Math.sin(t)*r,ox:0,oz:0});
    }
  } else if(geo==='cube'){
    const s=Math.round(Math.cbrt(n));
    const ss=Math.max(2,s);
    for(let x=0;x<ss;x++)
      for(let y=0;y<ss;y++)
        for(let z=0;z<ss;z++){
          L.nodes.push({x:(x/(ss-1))*2-1,y:(y/(ss-1))*2-1,z:(z/(ss-1))*2-1,ox:0,oz:0});
        }
  } else if(geo==='torus'){
    const R=0.65,r2=0.28,segs=Math.ceil(Math.sqrt(n)*1.5),tubes=Math.ceil(n/segs);
    for(let i=0;i<segs&&L.nodes.length<n;i++)
      for(let j=0;j<tubes&&L.nodes.length<n;j++){
        const u=i/segs*Math.PI*2,v=j/tubes*Math.PI*2;
        L.nodes.push({x:(R+r2*Math.cos(v))*Math.cos(u),y:r2*Math.sin(v),z:(R+r2*Math.cos(v))*Math.sin(u),ox:0,oz:0});
      }
  } else if(geo==='icosa'){
    const phi=Math.PI*(3-Math.sqrt(5));
    for(let i=0;i<n;i++){
      const y=1-(i/Math.max(n-1,1))*2,r=Math.sqrt(Math.max(0,1-y*y)),t=phi*i;
      const s=0.8,nx=Math.cos(t)*r*s+Math.round(Math.cos(t)*r*2)/2*(1-s);
      const ny=y*s+Math.round(y*2)/2*(1-s),nz=Math.sin(t)*r*s+Math.round(Math.sin(t)*r*2)/2*(1-s);
      const len=Math.sqrt(nx*nx+ny*ny+nz*nz)||1;
      L.nodes.push({x:nx/len,y:ny/len,z:nz/len,ox:0,oz:0});
    }
  } else if(geo==='wave'){
    const cols=Math.ceil(Math.sqrt(n)),rows=Math.ceil(n/cols);
    for(let i=0;i<rows&&L.nodes.length<n;i++)
      for(let j=0;j<cols&&L.nodes.length<n;j++)
        L.nodes.push({x:(j/(cols-1)||0)*2-1,y:0,z:(i/(rows-1)||0)*2-1,ox:j/(cols-1)||0,oz:i/(rows-1)||0});
  } else if(geo==='dna'){
    const turns=4;
    const radius=0.28;
    const stretch=2.2; // menos estirado
    // Hebras helicoidales
    for(let i=0;i<n;i++){
      const t=i/n, a=t*turns*Math.PI*2, side=i%2?1:-1;
      L.nodes.push({x:Math.cos(a+side*Math.PI/2)*radius, y:(t-0.5)*stretch, z:Math.sin(a+side*Math.PI/2)*radius, ox:t, oz:0});
    }
    // Tapa superior — círculo plano
    const capN=8;
    for(let i=0;i<capN;i++){
      const a=i/capN*Math.PI*2;
      L.nodes.push({x:Math.cos(a)*radius,y:stretch/2,z:Math.sin(a)*radius,ox:0,oz:0});
    }
    // Tapa inferior
    for(let i=0;i<capN;i++){
      const a=i/capN*Math.PI*2;
      L.nodes.push({x:Math.cos(a)*radius,y:-stretch/2,z:Math.sin(a)*radius,ox:0,oz:0});
    }
  } else if(geo==='diamond'){
    const ang=(i,total,offset)=>i/total*Math.PI*2+(offset||0);
    const crown=Math.max(4,Math.floor(n*0.22));
    const girdle=Math.max(8,Math.floor(n*0.45));
    const pav=crown; // simétrico
    L.nodes.push({x:0,y:1,z:0,ox:0,oz:0}); // 0 top
    for(let i=0;i<crown;i++) L.nodes.push({x:Math.cos(ang(i,crown))*0.55,y:0.52,z:Math.sin(ang(i,crown))*0.55,ox:0,oz:0}); // corona
    for(let i=0;i<girdle;i++) L.nodes.push({x:Math.cos(ang(i,girdle))*1,y:0,z:Math.sin(ang(i,girdle))*1,ox:0,oz:0}); // girdle
    for(let i=0;i<pav;i++) L.nodes.push({x:Math.cos(ang(i,pav,Math.PI/pav))*0.55,y:-0.52,z:Math.sin(ang(i,pav,Math.PI/pav))*0.55,ox:0,oz:0}); // pabellón
    L.nodes.push({x:0,y:-1,z:0,ox:0,oz:0}); // culet
    const c2=crown+1, g2=c2+girdle, p2=g2+pav;
    for(let i=1;i<=crown;i++) L.edges.push([0,i],[i,i===crown?1:i+1]);
    for(let i=0;i<crown;i++) L.edges.push([i+1, c2+Math.round(i/crown*girdle)%girdle]);
    for(let i=c2;i<g2;i++) L.edges.push([i,i===g2-1?c2:i+1]);
    for(let i=0;i<pav;i++) L.edges.push([c2+Math.round(i/pav*girdle)%girdle, g2+i]);
    for(let i=g2;i<p2;i++) L.edges.push([i,i===p2-1?g2:i+1],[i,p2]);
  }
  // Edges
  const nn=L.nodes.length;
  for(let i=0;i<nn;i++){
    const a=L.nodes[i],d=[];
    for(let j=0;j<nn;j++){if(i===j)continue;const b=L.nodes[j];d.push({j,d:(a.x-b.x)**2+(a.y-b.y)**2+(a.z-b.z)**2});}
    d.sort((a,b)=>a.d-b.d);
    for(let k=0;k<Math.min(L.links,d.length);k++){if(i<d[k].j)L.edges.push([i,d[k].j]);}
  }
}

// RENDER
function rot(nodes,ax,ay,az){
  const cx=Math.cos(ax),sx=Math.sin(ax),cy=Math.cos(ay),sy=Math.sin(ay),cz=Math.cos(az),sz=Math.sin(az);
  return nodes.map(n=>{
    let{x,y,z}=n;
    [y,z]=[y*cx-z*sx,y*sx+z*cx];
    [x,z]=[x*cy+z*sy,-x*sy+z*cy];
    [x,y]=[x*cz-y*sz,x*sz+y*cz];
    return{x,y,z,ox:n.ox,oz:n.oz};
  });
}

// Ruido simple basado en seno — no usa Math.random() en render
function snoise(x,y,z){
  return Math.sin(x*1.7+y*3.1)*Math.cos(y*2.3+z*1.9)*Math.sin(z*2.7+x*1.3);
}

let lastT=performance.now(),fps=60,lastFrame=0;
let layerAngles={};

function draw(ts){
  requestAnimationFrame(draw);
  if(ts-lastFrame<33)return;
  lastFrame=ts;
  if(G.freeze)return;
  const now=performance.now(),dt=Math.min((now-lastT)/1000,0.05);lastT=now;
  fps=fps*0.9+(1/Math.max(dt,0.001))*0.1;
  document.getElementById('hud-fps').textContent=Math.round(fps)+' FPS';
  time+=dt;
  readAudio();

  // Angulos globales
  aX+=G.rotX*dt*0.3;aY+=G.rotY*dt*0.3;aZ+=G.rotZ*dt*0.3;

  // Angulos por capa — rotSpeed afecta X e Y, rotX/rotY son velocidades independientes por eje
  layers.forEach(L=>{
    if(!layerAngles[L.id])layerAngles[L.id]={x:0,y:0,z:0};
    const spd=(G.speed||1);
    if(L.bpmSync&&BPM.bpm>0){
      const bpmFactor=BPM.bpm/120;
      layerAngles[L.id].x += (L.rotY||0) * spd * bpmFactor * dt;
      layerAngles[L.id].y += (L.rotX||0) * spd * bpmFactor * dt;
    } else {
      layerAngles[L.id].x += (L.rotY||0) * spd * dt;
      layerAngles[L.id].y += (L.rotX||0) * spd * dt;
    }
    if(L.driftX||L.driftY){
      L.driftOx=(L.driftOx||0)+(L.driftX||0)*dt*0.15;
      L.driftOy=(L.driftOy||0)+(L.driftY||0)*dt*0.15;
    }
    // ORBIT
    if(L.orbitSpd) L.orbitAngle=(L.orbitAngle||0)+L.orbitSpd*dt;
    // SHAKE — dispara con beat o con banda y decae rápido
    if(L.shakeInt&&L.shakeOn){
      const bd=L.band?BAND_DETECT[L.band]:null;
      const totalEnergy=sBands.sub+sBands.bass+sBands.mid+sBands.hi;
      const audioHit=bd?bd.flash>0.5:totalEnergy>0.15;
      const bpmHit=BPM.onBeat&&BPM.bpm>0;
      const hit=L.shakeSource==='bpm'?bpmHit:audioHit;
      if(hit) L.shakeVal=L.shakeInt;
      L.shakeVal=(L.shakeVal||0)*(L.shakeDecay||0.2);
    } else { L.shakeVal=0; }
  });

  // BPM tick
  tickStrobe(now);

  // Trail — usa el máximo trail de las capas activas
  const activeTrail=layers.filter(L=>L.on).reduce((mx,L)=>Math.max(mx,L.trail||0),0);
  if(activeTrail<=0){
    ctx.fillStyle='rgb(2,4,8)';
    ctx.fillRect(0,0,canvas.width,canvas.height);
  } else {
    ctx.fillStyle=`rgba(2,4,8,${1-activeTrail})`;
    ctx.fillRect(0,0,canvas.width,canvas.height);
  }

  // Zoom global
  let beatScale=1;
  if(G.strobe&&BPM.bpm>0){
    const zoom=BPM.flash*BPM.flash*G.strobeInt*3;
    beatScale=Math.max(0.05,0.05+zoom*G.strobeInt*4+(1-G.strobeInt)*(1-BPM.flash*0.8));
  } else if(G.beatPulse){
    beatScale=1+G.beatInt*BPM.flash*0.3;
  }
  const R=Math.min(canvas.width,canvas.height)*(G.rad/100)*beatScale;

  layers.forEach(L=>{
    if(!L.on)return;
    const band=L.band?(sBands[L.band]||0):0;
    const bandFlash=L.band&&BAND_DETECT[L.band]?BAND_DETECT[L.band].flash:0;
    const amp=(band+bandFlash*0.3)*L.amp;
    const C=COLS[L.ci%COLS.length];
    const la=layerAngles[L.id]||{x:0,y:0,z:0};

    // PARTICULAS
    if(L.geo==='part'){
      const cx=canvas.width/2+L.ox*canvas.width;
      const cy=canvas.height/2+L.oy*canvas.height;
      const kick=(sBands.sub+sBands.bass)*0.5*L.amp;
      const hat=sBands.hi*L.amp;
      const mid=sBands.mid*L.amp;
      const beatBoost=BPM.onBeat?2.5:1;
      const ks=Math.floor(kick*12*beatBoost);
      for(let s=0;s<ks&&L.particles.length<L.maxPart;s++){
        const a=Math.random()*Math.PI*2,sp=2+Math.random()*5*kick;
        L.particles.push({x:cx+(Math.random()-0.5)*20,y:cy+(Math.random()-0.5)*20,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,decay:0.008+Math.random()*0.012,size:2+Math.random()*4+kick*4,type:'kick',r:C.r,g:C.g,b:C.b});
      }
      const hs2=Math.floor(hat*20);
      for(let s=0;s<hs2&&L.particles.length<L.maxPart;s++){
        const a=Math.random()*Math.PI*2,dist=(0.2+Math.random()*0.8)*R,sp=3+Math.random()*8*hat;
        L.particles.push({x:cx+Math.cos(a)*dist*0.5,y:cy+Math.sin(a)*dist*0.5,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,decay:0.04+Math.random()*0.06,size:0.5+Math.random()*1.5,type:'hat',r:C.r,g:C.g,b:C.b});
      }
      const ms2=Math.floor(mid*5);
      for(let s=0;s<ms2&&L.particles.length<L.maxPart;s++){
        const a=Math.random()*Math.PI*2,sp=0.5+Math.random()*2*mid;
        L.particles.push({x:cx+Math.cos(a)*R*0.3,y:cy+Math.sin(a)*R*0.3,vx:Math.cos(a+Math.PI/2)*sp,vy:Math.sin(a+Math.PI/2)*sp,life:1,decay:0.005+Math.random()*0.008,size:1+Math.random()*2,type:'mid',r:C.r,g:C.g,b:C.b});
      }
      L.particles=L.particles.filter(p=>p.life>0);
      L.particles.forEach(p=>{
        const grav=p.type==='hat'?0.02:0.06,drag=p.type==='hat'?0.96:0.98;
        p.x+=p.vx;p.y+=p.vy;p.vy+=grav;p.vx*=drag;p.vy*=drag;p.life-=p.decay;
        const alpha=Math.max(0,p.life)*L.opacity,sz=Math.max(0.3,p.size*p.life);
        if(L.glow>0&&p.type!=='hat'){
          const gr=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,sz+L.glow*p.life*0.5);
          gr.addColorStop(0,`rgba(${p.r},${p.g},${p.b},${alpha*0.8})`);
          gr.addColorStop(1,`rgba(${p.r},${p.g},${p.b},0)`);
          ctx.beginPath();ctx.arc(p.x,p.y,sz+L.glow*p.life*0.5,0,Math.PI*2);ctx.fillStyle=gr;ctx.fill();
        }
        ctx.beginPath();ctx.arc(p.x,p.y,sz,0,Math.PI*2);
        ctx.fillStyle=`rgba(${p.r},${p.g},${p.b},${alpha})`;ctx.fill();
      });
      return;
    }

    // ZOOM por capa
    const layerOpacity=L.on?(L.opacity??1):0;
    if(L.zoom){
      // Dispara con el flash de la banda propia O con el BPM global
      const bandHit=bd&&bd.flash>0.7;
      const bpmHit=BPM.onBeat&&BPM.bpm>0;
      if(bandHit||bpmHit) L.zoomFlash=1;
      L.zoomFlash=(L.zoomFlash||0)*(L.zoomDecay||0.78);
      const lz=L.zoomFlash*L.zoomFlash*L.zoomInt*3;
      var lScale=Math.max(0.05,0.05+lz*L.zoomInt*4+(1-L.zoomInt)*(1-L.zoomFlash*0.8));
    } else { var lScale=1; }

    // HAT KICK — empujón brusco para bandas de agudos
    const bdFlash=BAND_DETECT[L.band];
    if(!L.hatKick) L.hatKick=0;
    if(bdFlash&&bdFlash.flash>0.8){
      L.hatKick=Math.min(1, 0.4 + (1-bdFlash.thr*5)*0.4);
    }
    L.hatKick*=0.45;
    const hatBurst=L.hatKick*L.amp*0.5;

    // SCATTER — dispara con beat, cada nodo explota hacia afuera
    if(L.scatterInt&&L.scatterOn){
      const bd=L.band&&L.band!=='all'?BAND_DETECT[L.band]:null;
      const totalEnergy=sBands.sub+sBands.bass+sBands.mid+sBands.hi;
      const audioHit=bd?bd.flash>0.5:totalEnergy>0.15;
      const bpmHit=BPM.onBeat&&BPM.bpm>0;
      const hit=L.scatterSource==='bpm'?bpmHit:audioHit;
      if(hit) L.scatterVal=L.scatterInt;
      L.scatterVal=(L.scatterVal||0)*(L.scatterDecay||0.3);
    } else { L.scatterVal=0; }

    const ps=(1+amp*0.3)*lScale;
    const noiseT=time*(L.noiseSpd||1);
    const noiseMag=(L.noiseInt||0)*(1+amp*0.5);
    const def=L.nodes.map((n,i)=>{
      const len=Math.sqrt(n.x*n.x+n.y*n.y+n.z*n.z)||1;
      const push=amp*0.5*Math.sin(time*3+i*0.4);
      const vib=amp*0.06*Math.sin(time*6+i*0.9);
      const burst=hatBurst*1.2;
      // NOISE — desplaza cada nodo individualmente
      const nx=noiseMag*snoise(n.x+noiseT,n.y*1.3,n.z*0.7+i*0.1);
      const ny=noiseMag*snoise(n.y+noiseT*1.1,n.z*0.9,n.x*1.2+i*0.15);
      const nz=noiseMag*snoise(n.z+noiseT*0.9,n.x*1.1,n.y*0.8+i*0.2);
      const scatter=(L.scatterVal||0)*1.5;
      // Dirección caótica — basada en índice del nodo, no random por frame
      const cx2=Math.sin(i*2.4+1.7)*Math.cos(i*1.3);
      const cy2=Math.cos(i*3.1+0.9)*Math.sin(i*1.8);
      const cz2=Math.sin(i*1.9+2.3)*Math.cos(i*2.7);
      return{x:(n.x+n.x/len*(push+burst)+cx2*scatter+vib+nx)*ps,y:(n.y+n.y/len*(push+burst)+cy2*scatter+vib+ny)*ps,z:(n.z+n.z/len*(push+burst)+cz2*scatter+nz)*ps,ox:n.ox,oz:n.oz};
    });

    // Rotacion global + rotacion propia de la capa
    const rotated=rot(def, aX+la.x, aY+la.y, aZ+la.z);
    const orbitOffX=L.orbitR?Math.cos(L.orbitAngle||0)*L.orbitR:0;
    const orbitOffY=L.orbitR?Math.sin(L.orbitAngle||0)*L.orbitR*0.5:0;
    if(!L._shakeX) L._shakeX=0;
    if(!L._shakeY) L._shakeY=0;
    if(L.shakeVal){
      const mag=L.shakeVal*Math.min(canvas.width,canvas.height)*0.03;
      L._shakeX=L._shakeX*0.3+(Math.random()-0.5)*mag*0.7;
      L._shakeY=L._shakeY*0.3+(Math.random()-0.5)*mag*0.7;
    } else { L._shakeX*=0.5; L._shakeY*=0.5; }
    const shakeX=L._shakeX, shakeY=L._shakeY;
    const mirrorOffX=L.mirrorH?(L.mirrorX||0)*canvas.width*0.5:0;
    const mirrorOffY=L.mirrorV?(L.mirrorY||0)*canvas.height*0.5:0;
    const cx=canvas.width/2+(L.ox+(L.driftOx||0)+orbitOffX)*canvas.width+shakeX-mirrorOffX;
    const cy=canvas.height/2+(L.oy+(L.driftOy||0)+orbitOffY)*canvas.height+shakeY-mirrorOffY;
    const Rl=R*(1+(L.rad||0)/100)*lScale;
    // DRIFT wrap — usa Rl real para saber exactamente cuándo el elemento salió completamente
    if(L.driftX||L.driftY){
      const marginX=(Rl*1.1)/canvas.width;
      const marginY=(Rl*1.1)/canvas.height;
      const wx=0.5+marginX;
      const wy=0.5+marginY;
      if(L.driftBounce){
        const lim=(L.driftLimit||0.8);
        const bx=wx*lim, by=wy*lim;
        if(L.driftOx>bx){L.driftOx=bx;L.driftX=-Math.abs(L.driftX);}
        if(L.driftOx<-bx){L.driftOx=-bx;L.driftX=Math.abs(L.driftX);}
        if(L.driftOy>by){L.driftOy=by;L.driftY=-Math.abs(L.driftY);}
        if(L.driftOy<-by){L.driftOy=-by;L.driftY=Math.abs(L.driftY);}
      } else {
        // WRAP normal — entra por el lado opuesto
        L.driftOx=((L.driftOx+wx)%(wx*2)+wx*2)%(wx*2)-wx;
        L.driftOy=((L.driftOy+wy)%(wy*2)+wy*2)%(wy*2)-wy;
      }
    }
    // Perspectiva suave - nodos del frente mas grandes que los del fondo
    const fov=Rl*4;
    const pts=rotated.map((n,i)=>{
      const zz=n.z*Rl+fov;
      const sc=fov/Math.max(zz,fov*0.1);
      return{x:n.x*Rl*sc+cx, y:n.y*Rl*sc+cy, z:n.z*Rl, sc, i};
    });
    pts.sort((a,b)=>a.z-b.z);
    const ptMap=new Array(L.nodes.length);pts.forEach(p=>ptMap[p.i]=p);
    const maxZ=Rl,minZ=-Rl;

    // Edges
    L.edges.forEach(([a,b])=>{
      const pa=ptMap[a],pb=ptMap[b];if(!pa||!pb)return;
      const depth=((pa.z+pb.z)/2-minZ)/(maxZ-minZ+1);
      const alpha=(0.5+depth*0.5)*(L.lineOpacity??1)*layerOpacity;
      ctx.beginPath();ctx.moveTo(pa.x,pa.y);ctx.lineTo(pb.x,pb.y);
      ctx.strokeStyle=`rgba(${C.r},${C.g},${C.b},${alpha})`;
      ctx.lineWidth=1;ctx.stroke();
    });

    // Tentáculos
    if(L.tent&&amp>0.01){
      const tentAlpha=Math.min(1,amp*2)*(L.lineOpacity??1)*layerOpacity;
      const tentSize=Rl*L.tentLen*amp;
      pts.forEach((pt,idx)=>{
        if(idx%Math.max(1,Math.floor(pts.length/40))!==0)return;
        const depth=(pt.z-minZ)/(maxZ-minZ+1);
        const alpha=tentAlpha*(0.3+depth*0.7);
        for(let t=0;t<L.tentN;t++){
          const angle=(t/L.tentN)*Math.PI*2+time*2+idx*0.5;
          const len=tentSize*(0.5+Math.random()*0.5);
          ctx.beginPath();ctx.moveTo(pt.x,pt.y);
          ctx.lineTo(pt.x+Math.cos(angle)*len,pt.y+Math.sin(angle)*len);
          ctx.strokeStyle=`rgba(${C.r},${C.g},${C.b},${alpha*0.7})`;
          ctx.lineWidth=0.5+amp*1.5;ctx.stroke();
        }
      });
    }

    // Nodos
    if(L.nodeSize>0&&(L.nodeOpacity??1)*layerOpacity>0){
      const radFactor=Math.min(1, G.rad/25);
      pts.forEach(pt=>{
        const depth=(pt.z-minZ)/(maxZ-minZ+1);
        const nr=(L.nodeSize*0.5+depth*L.nodeSize*0.5+amp*2)*lScale*radFactor;
        const alpha=(0.3+depth*0.7)*(L.nodeOpacity??1)*layerOpacity;
        if(L.glow>0){
          const gr=ctx.createRadialGradient(pt.x,pt.y,0,pt.x,pt.y,Math.max(1, Math.min(nr+L.glow*Math.max(0,depth), 60)));
          gr.addColorStop(0,`rgba(${C.r},${C.g},${C.b},${alpha*0.7})`);
          gr.addColorStop(1,`rgba(${C.r},${C.g},${C.b},0)`);
          ctx.beginPath();ctx.arc(pt.x,pt.y,Math.max(1, Math.min(nr+L.glow*Math.max(0,depth), 60)),0,Math.PI*2);ctx.fillStyle=gr;ctx.fill();
        }
        ctx.beginPath();ctx.arc(pt.x,pt.y,Math.max(0.5,nr),0,Math.PI*2);
        ctx.fillStyle=`rgba(${C.r},${C.g},${C.b},${alpha})`;ctx.fill();
      });
    }

    // MIRROR — dibuja reflejo horizontal y/o vertical
    if(L.mirrorH||L.mirrorV){
      const drawReflected=(getPt)=>{
        const rpts=pts.map(getPt);
        const rptMap=new Array(L.nodes.length);rpts.forEach(p=>rptMap[p.i]=p);
        L.edges.forEach(([a,b])=>{
          const pa=rptMap[a],pb=rptMap[b];if(!pa||!pb)return;
          const depth=((pa.z+pb.z)/2-minZ)/(maxZ-minZ+1);
          ctx.beginPath();ctx.moveTo(pa.x,pa.y);ctx.lineTo(pb.x,pb.y);
          ctx.strokeStyle=`rgba(${C.r},${C.g},${C.b},${(0.5+depth*0.5)*(L.lineOpacity??1)*layerOpacity})`;
          ctx.lineWidth=1;ctx.stroke();
        });
        if(L.nodeSize>0&&(L.nodeOpacity??1)*layerOpacity>0){
          const rf=Math.min(1,G.rad/25);
          rpts.forEach(pt=>{
            const depth=(pt.z-minZ)/(maxZ-minZ+1);
            const nr=(L.nodeSize*0.5+depth*L.nodeSize*0.5+amp*2)*lScale*rf;
            const alpha=(0.3+depth*0.7)*(L.nodeOpacity??1)*layerOpacity;
            if(L.glow>0){
              const gr=ctx.createRadialGradient(pt.x,pt.y,0,pt.x,pt.y,Math.max(1, Math.min(nr+L.glow*Math.max(0,depth), 60)));
              gr.addColorStop(0,`rgba(${C.r},${C.g},${C.b},${alpha*0.7})`);
              gr.addColorStop(1,`rgba(${C.r},${C.g},${C.b},0)`);
              ctx.beginPath();ctx.arc(pt.x,pt.y,Math.max(1, Math.min(nr+L.glow*Math.max(0,depth), 60)),0,Math.PI*2);ctx.fillStyle=gr;ctx.fill();
            }
            ctx.beginPath();ctx.arc(pt.x,pt.y,Math.max(0.5,nr),0,Math.PI*2);
            ctx.fillStyle=`rgba(${C.r},${C.g},${C.b},${alpha})`;ctx.fill();
          });
        }
      };
      if(L.mirrorH) drawReflected(pt=>({...pt, x:cx+mirrorOffX*2-(pt.x-cx)}));
      if(L.mirrorV) drawReflected(pt=>({...pt, y:cy+mirrorOffY*2-(pt.y-cy)}));
      if(L.mirrorH&&L.mirrorV) drawReflected(pt=>({...pt, x:cx+mirrorOffX*2-(pt.x-cx), y:cy+mirrorOffY*2-(pt.y-cy)}));
    }
  });
}

const FADER_COLORS=['#00ffe0','#ff3cac','#ffe600','#39ff14'];
function buildFaders(){
  const container=document.getElementById('faders-container');
  if(!container)return;
  container.innerHTML='';
  layers.forEach((L,i)=>{
    const C=COLS[L.ci%COLS.length];
    const col=C.h;
    const opacity=L.on?1:0.4;
    const pct=Math.round((L.opacity??1)*100);
    const div=document.createElement('div');
    div.className='bb-fw';
    div.innerHTML=`
      <button class="bb-fon" id="fon-${i}" style="color:${col};border-color:${col};opacity:${opacity}" onclick="togL(${L.id})">${L.on?'ON':'OFF'}</button>
      <div class="bb-ft" id="ft-${i}">
        <div class="bb-ff" id="ff-${i}" style="height:${pct}%;background:${col};opacity:${L.on?0.35:0.15}"></div>
        <div class="bb-fth" id="fth-${i}" style="bottom:calc(${pct}% - 2.5px);background:${col};box-shadow:0 0 5px ${col};opacity:${opacity}"></div>
      </div>
      <span class="bb-fpct" id="fpct-${i}" style="opacity:${opacity}">${pct}%</span>
    `;
    container.appendChild(div);

    // Drag
    let dragging=false;
    const track=div.querySelector('.bb-ft');
    track.addEventListener('mousedown',e=>{dragging=true;updateFader(e,i,L,col);});
    document.addEventListener('mousemove',e=>{if(dragging)updateFader(e,i,L,col);});
    document.addEventListener('mouseup',()=>dragging=false);
  });
}

function updateFader(e,i,L,col,directVal){
  const track=document.getElementById('ft-'+i);
  if(!track) return;
  let v;
  if(directVal!==undefined){
    v=Math.max(0,Math.min(1,directVal));
  } else if(e){
    if(midiMapMode){startMidiLearn(track,{type:'fader',id:L.id,idx:i});return;}
    const rect=track.getBoundingClientRect();
    v=1-(e.clientY-rect.top)/rect.height;
    v=Math.max(0,Math.min(1,v));
  } else return;
  L.opacity=v;
  const pct=Math.round(v*100);
  const fill=document.getElementById('ff-'+i);
  const thumb=document.getElementById('fth-'+i);
  const pctEl=document.getElementById('fpct-'+i);
  if(fill) fill.style.height=pct+'%';
  if(thumb) thumb.style.bottom='calc('+pct+'% - 2.5px)';
  if(pctEl) pctEl.textContent=pct+'%';
}

let midiMapMode=false;
let midiWaitingEl=null;  // elemento esperando mapeo
let midiWaitingMeta=null;

async function initMIDI(){
  if(!navigator.requestMIDIAccess){
    console.log('Web MIDI no disponible en este navegador — MIDI deshabilitado.');
    return;
  }
  try{
    midiAccess=await navigator.requestMIDIAccess();
    midiAccess.inputs.forEach(input=>{
      input.onmidimessage=onMIDIMessage;
    });
    midiAccess.onstatechange=e=>{
      if(e.port.type==='input'){
        if(e.port.state==='connected') e.port.onmidimessage=onMIDIMessage;
      }
    };
    const btn=document.getElementById('midi-map-btn');
    if(btn) btn.style.color='rgba(255,200,0,0.9)';
    console.log('MIDI conectado:',midiAccess.inputs.size,'inputs');
  }catch(e){
    console.log('MIDI error:',e);
  }
}

function onMIDIMessage(e){
  const [status,cc,value]=e.data;
  const type=status&0xf0;
  // Solo CC (0xB0) y Note On (0x90)
  if(type!==0xB0&&type!==0x90) return;
  const key=`${type}-${cc}`;

  if(midiWaitingEl){
    midiMapping[key]=midiWaitingMeta;
    midiWaitingEl.classList.remove('waiting');
    midiWaitingEl.classList.add('mapped');
    midiWaitingEl=null;
    midiWaitingMeta=null;
    saveMidiMapping();
    return;
  }

  // Aplicar mapeo
  if(midiMapping[key]){
    applyMIDI(midiMapping[key], value/127);
  }
}

function startLayerMidiMap(layerId){
  if(!midiAccess){initMIDI().then(()=>startLayerMidiMap(layerId));return;}
  // Cancelar cualquier mapeo anterior
  if(midiWaitingEl){
    midiWaitingEl.style.outline='';
    midiWaitingEl.style.boxShadow='';
  }
  const btn=document.getElementById('midi-capa-'+layerId);
  if(!btn) return;
  midiWaitingEl=btn;
  midiWaitingMeta={type:'fader',id:layerId,idx:layerId};
  btn.style.outline='2px solid #ffc800';
  btn.style.boxShadow='0 0 10px #ffc800';
  btn.style.color='#ffc800';
  btn.textContent='...';
  // Auto-cancelar en 10s
  setTimeout(()=>{
    if(midiWaitingEl===btn){
      midiWaitingEl=null;
      btn.style.outline='';
      btn.style.boxShadow='';
      btn.style.color='rgba(255,200,0,0.5)';
      btn.textContent='MAP';
    }
  },10000);
}

function attachMidiListeners(){
  document.querySelectorAll('.midi-wrap').forEach(wrap=>{
    const el=wrap.querySelector('[data-midi-id]');
    if(!el) return;
    wrap.onclick=function(e){
      if(!midiMapMode) return;
      e.stopPropagation();
      document.querySelectorAll('.midi-wrap.waiting').forEach(w=>w.classList.remove('waiting'));
      wrap.classList.add('waiting');
      midiWaitingEl=wrap;
      midiWaitingMeta={
        type:'layer',
        id:parseInt(el.dataset.midiId),
        param:el.dataset.midiParam,
        min:parseFloat(el.dataset.midiMin||0),
        max:parseFloat(el.dataset.midiMax||1)
      };
    };
  });
}

function midiLearnSlider(el,layerId,param,min,max){
  if(!midiMapMode) return;
  startMidiLearn(el,{type:'layer',id:layerId,param,min,max});
}

function applyMIDI(meta, v){
  if(meta.type==='global'){
    if(meta.param==='rad'){G.rad=5+v*90;const el=document.getElementById('v-r');if(el)el.textContent=Math.round(G.rad)+'%';}
    if(meta.param==='speed'){G.speed=0.05+v*2.95;const el=document.getElementById('v-spd');if(el)el.textContent=G.speed.toFixed(2);}
    if(meta.param==='smooth'){G.smooth=0.1+v*0.89;const el=document.getElementById('v-sm');if(el)el.textContent=G.smooth.toFixed(2);}
  } else if(meta.type==='fader'){
    const idx=layers.findIndex(L=>L.id===meta.id);
    if(idx<0) return;
    const L=layers[idx];
    const col=COLS[L.ci%COLS.length].h;
    L.opacity=v;
    const pct=Math.round(v*100);
    const fill=document.getElementById('ff-'+idx);
    const thumb=document.getElementById('fth-'+idx);
    const pctEl=document.getElementById('fpct-'+idx);
    if(fill) fill.style.height=pct+'%';
    if(thumb) thumb.style.bottom='calc('+pct+'% - 2.5px)';
    if(pctEl) pctEl.textContent=pct+'%';
  } else if(meta.type==='layer'){
    const L=getL(meta.id);
    if(!L) return;
    const min=meta.min||0, max=meta.max||1;
    const val=min+v*(max-min);
    L[meta.param]=val;
    saveGeoState(L);
    // Actualizar display si existe
    const displays={
      rotX:'vrx',rotY:'vry',
      driftX:'vdx',driftY:'vdy',
      noiseInt:'vni',noiseSpd:'vns2',
      scatterInt:'vsi',
      mirrorX:'vmx',mirrorY:'vmy',
      shakeInt:'vsh',
      rad:'vrad',
      orbitR:'vor',orbitSpd:'vos'
    };
    const displayId=displays[meta.param];
    if(displayId){
      const el=document.getElementById(displayId+meta.id);
      if(el) el.textContent=val.toFixed(2);
    }
    // Mirror activa automáticamente
    if(meta.param==='mirrorX') L.mirrorH=val>0;
    if(meta.param==='mirrorY') L.mirrorV=val>0;
  } else if(meta.type==='toggle'){
    if(v>0.5){
      if(meta.param==='freeze') toggleFreeze();
      else if(meta.param==='layer'){const L=getL(meta.id);if(L)togL(meta.id);}
    }
  }
}

function toggleMidiMap(){
  if(!midiAccess){initMIDI();return;}
  midiMapMode=!midiMapMode;
  const btn=document.getElementById('midi-map-btn');
  if(midiMapMode){
    btn.textContent='⬡ MAPEANDO...';
    btn.style.borderColor='#ffc800';
    btn.style.color='#ffc800';
    btn.style.background='rgba(255,200,0,0.1)';
    document.body.classList.add('midi-mapping');
    removeMidiOverlays();
  } else {
    btn.textContent='⬡ MIDI MAP';
    btn.style.background='';
    btn.style.borderColor='rgba(255,200,0,0.4)';
    btn.style.color='rgba(255,200,0,0.6)';
    document.body.classList.remove('midi-mapping');
    removeMidiOverlays();
    if(midiWaitingEl){midiWaitingEl=null;midiWaitingMeta=null;}
  }
}

function addMidiOverlays(){
  removeMidiOverlays();
  document.querySelectorAll('[data-midi-id]').forEach(el=>{
    const wrap=el.closest('.midi-wrap');
    if(!wrap) return;
    wrap.onclick=function(e){
      if(!midiMapMode) return;
      // Quitar waiting anterior
      document.querySelectorAll('.midi-wrap.waiting').forEach(w=>w.classList.remove('waiting'));
      wrap.classList.add('waiting');
      midiWaitingEl=wrap;
      midiWaitingMeta={
        type:'layer',
        id:parseInt(el.dataset.midiId),
        param:el.dataset.midiParam,
        min:parseFloat(el.dataset.midiMin||0),
        max:parseFloat(el.dataset.midiMax||1)
      };
    };
  });
}

function removeMidiOverlays(){
  document.querySelectorAll('.midi-wrap').forEach(w=>{
    w.onclick=null;
    w.classList.remove('waiting');
  });
}

function highlightMappable(on){
  const style=on?'1px solid rgba(255,200,0,0.6)':'';
  const shadow=on?'0 0 6px rgba(255,200,0,0.3)':'';
  // Sliders globales
  ['v-r','v-spd','v-sm'].forEach(id=>{
    const el=document.getElementById(id);
    if(el){el.style.outline=style;el.style.boxShadow=shadow;}
  });
  // Faders
  for(let i=0;i<4;i++){
    const el=document.getElementById('ft-'+i);
    if(el){el.style.outline=style;el.style.boxShadow=shadow;}
  }
}

function startMidiLearn(el, meta){
  if(!midiMapMode) return;
  if(midiWaitingEl&&midiWaitingEl.classList) midiWaitingEl.classList.remove('waiting');
  midiWaitingEl=el;
  midiWaitingMeta=meta;
  if(el.classList) el.classList.add('waiting');
}

function saveMidiMapping(){
  try{localStorage.setItem('nodoscope_midi',JSON.stringify(midiMapping));}catch(e){}
}
function loadMidiMapping(){
  try{const s=localStorage.getItem('nodoscope_midi');if(s)midiMapping=JSON.parse(s);}catch(e){}
}
loadMidiMapping();

  mobUpdateHeader();

function mobUpdateHeader(){
  const L = layers[mobLayerIdx];
  if(!L) return;
  const C = COLS[L.ci % COLS.length];
  const dot = document.getElementById('mob-layer-dot');
  const tog = document.getElementById('mob-layer-tog');
  if(dot){ dot.style.background = C.h; dot.style.boxShadow = `0 0 6px ${C.h}`; }
  if(tog){ tog.textContent = L.on ? 'ON' : 'OFF'; tog.className = L.on ? 'on' : ''; }
}

function mobTogLayer(){
  const L = layers[mobLayerIdx];
  if(!L) return;
  togL(L.id);   // función original
  mobUpdateHeader();
}

// ── Cambiar pestaña ──
function mobTab(name){
  mobTabName = name;
  document.querySelectorAll('.mtab').forEach((b,i)=>{
    b.classList.toggle('active', ['forma','mov','fx'][i] === name);
  });
  document.querySelectorAll('.mpanel').forEach(p => p.classList.remove('active'));
  const panel = document.getElementById('mp-'+name);
  if(panel) panel.classList.add('active');
  if(name !== 'fx') mobRender();
}
